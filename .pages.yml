media:
  input: assets
  output: /assets
  categories: [image]
  rename: safe

settings:
  content:
    merge: true

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    format: yaml-frontmatter

    filename: "{date}-{title}.md"

    view:
      fields: [title, date]
      primary: title
      sort: [date, title]
      search: [title, body]
      default:
        sort: date
        order: desc

    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: date
        label: Publication date
        type: date
        required: true
        options:
          format: "yyyy-MM-dd"

      - name: body
        label: Article
        type: rich-text
        required: true
        options:
          format: markdown
          switcher: true
